document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

20, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"aeba5c38-1dac-43f9-9cd7-807fc61e3e48\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n</style>\n<style>/* ============================================================\n   FILIÈRE CODE — Design tokens & shared styles\n   Inspired by the reference slide: cream BG, purple accent,\n   navy text, multicolor gradient bar.\n   ============================================================ */\n\n:root {\n  /* Palette */\n  --cream: #FAF3E2;\n  --cream-2: #F4EAD0;\n  --cream-3: #EFE3C0;\n  --ink: #1A1530;\n  --ink-soft: #2E2748;\n  --ink-mute: #5A5170;\n  --violet: #7C5BFF;\n  --violet-deep: #5436D6;\n  --violet-soft: #E4DAFF;\n  --orange: #E97A50;\n  --orange-soft: #F4C9B3;\n\n  /* Gradient bar segments */\n  --g-sky: #B7D8E8;\n  --g-olive: #5E7D3A;\n  --g-lime: #C7DC4A;\n  --g-pink: #F2A8B5;\n  --g-mint: #A9D89F;\n  --g-yellow: #E8E04A;\n\n  /* Type scale (1920×1080) */\n  --type-display: 200px;\n  --type-mega: 156px;\n  --type-title: 96px;\n  --type-h1: 76px;\n  --type-h2: 56px;\n  --type-h3: 42px;\n  --type-body-lg: 34px;\n  --type-body: 28px;\n  --type-small: 22px;\n  --type-micro: 18px;\n\n  /* Spacing */\n  --pad-x: 110px;\n  --pad-top: 100px;\n  --pad-bottom: 90px;\n  --gap-title: 56px;\n  --gap-item: 28px;\n\n  /* Fonts */\n  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;\n  --font-serif: 'Instrument Serif', Georgia, serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, monospace;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  font-family: var(--font-display);\n  color: var(--ink);\n  background: #0a0a0a;\n  -webkit-font-smoothing: antialiased;\n}\n\ndeck-stage { background: #0a0a0a; }\n\nsection {\n  background: var(--cream);\n  color: var(--ink);\n  font-family: var(--font-display);\n  overflow: hidden;\n  position: relative;\n}\n\n/* ---------- Gradient bar (signature accent) ---------- */\n.gbar {\n  display: flex;\n  height: 16px;\n  border-radius: 2px;\n  overflow: hidden;\n  width: 320px;\n}\n.gbar > span { flex: 1; display: block; }\n.gbar > span:nth-child(1) { background: var(--g-sky); flex: 1.1; }\n.gbar > span:nth-child(2) { background: var(--g-olive); flex: 1.4; }\n.gbar > span:nth-child(3) { background: var(--g-lime); flex: 0.7; }\n.gbar > span:nth-child(4) { background: var(--g-pink); flex: 0.9; }\n.gbar > span:nth-child(5) { background: var(--g-mint); flex: 1.2; }\n.gbar > span:nth-child(6) { background: var(--g-yellow); flex: 1.0; }\n\n.gbar.lg { height: 22px; width: 520px; }\n.gbar.xl { height: 28px; width: 760px; }\n.gbar.sm { height: 10px; width: 200px; }\n\n/* Vertical bar */\n.gbar.vertical {\n  flex-direction: column;\n  width: 16px;\n  height: 320px;\n}\n\n/* ---------- Page number ---------- */\n.pageno {\n  position: absolute;\n  right: 60px;\n  bottom: 48px;\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 24px;\n  color: var(--orange);\n  letter-spacing: 0.02em;\n}\n\n.brand-corner {\n  position: absolute;\n  left: 60px;\n  bottom: 48px;\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 24px;\n  color: var(--ink-mute);\n  letter-spacing: 0.04em;\n}\n\n/* ---------- Standard slide frame ---------- */\n.frame {\n  position: absolute;\n  inset: 0;\n  padding: var(--pad-top) var(--pad-x) var(--pad-bottom);\n  display: flex;\n  flex-direction: column;\n}\n\n.eyebrow {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 24px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--orange);\n}\n\nh1.display, h1.title, h2.title {\n  font-family: var(--font-display);\n  font-weight: 800;\n  letter-spacing: -0.035em;\n  line-height: 0.92;\n  margin: 0;\n}\nh1.display { font-size: var(--type-display); }\nh1.title   { font-size: var(--type-title); }\nh2.title   { font-size: var(--type-h1); }\n\n.text-violet { color: var(--violet); }\n.text-ink { color: var(--ink); }\n.text-mute { color: var(--ink-mute); }\n.text-orange { color: var(--orange); }\n\n.quote {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: 34px;\n  color: var(--ink);\n  line-height: 1.35;\n  max-width: 1100px;\n}\n.quote strong { font-weight: 700; font-style: italic; font-family: var(--font-display); letter-spacing: -0.01em; }\n\n.byline {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: 26px;\n  color: var(--ink-mute);\n  text-align: right;\n  margin-top: 16px;\n}\n\n/* ---------- Animations: trigger on data-deck-active ----------\n   Default state is VISIBLE so html-to-image (and any non-animating\n   renderer) sees the final layout. The keyframes start at opacity:0\n   and the animation only fires when the slide becomes active.\n   When body has [data-no-anim], all animations are disabled. */\n.anim {\n  opacity: 1;\n  transform: none;\n}\n[data-deck-active] .anim {\n  animation: fadeUp 0.8s cubic-bezier(.2,.7,.2,1) both;\n}\nbody[data-no-anim] .anim,\nbody[data-no-anim] .anim-pop,\nbody[data-no-anim] .anim-wipe,\nbody[data-no-anim] .anim-stretch,\nbody[data-no-anim] [data-deck-active] .anim,\nbody[data-no-anim] [data-deck-active] .anim-pop,\nbody[data-no-anim] [data-deck-active] .anim-wipe,\nbody[data-no-anim] [data-deck-active] .anim-stretch,\nbody[data-no-anim] .marquee > div {\n  animation: none !important;\n  opacity: 1 !important;\n  transform: none !important;\n}\n[data-deck-active] .anim.d1 { animation-delay: 0.05s; }\n[data-deck-active] .anim.d2 { animation-delay: 0.18s; }\n[data-deck-active] .anim.d3 { animation-delay: 0.32s; }\n[data-deck-active] .anim.d4 { animation-delay: 0.46s; }\n[data-deck-active] .anim.d5 { animation-delay: 0.60s; }\n[data-deck-active] .anim.d6 { animation-delay: 0.74s; }\n[data-deck-active] .anim.d7 { animation-delay: 0.88s; }\n[data-deck-active] .anim.d8 { animation-delay: 1.02s; }\n\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(28px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n\n.anim-pop { opacity: 1; transform: none; }\n[data-deck-active] .anim-pop {\n  animation: popIn 0.7s cubic-bezier(.3,1.4,.4,1) both;\n}\n@keyframes popIn {\n  from { opacity: 0; transform: scale(0.86); }\n  to   { opacity: 1; transform: scale(1); }\n}\n\n.anim-wipe { transform-origin: left center; }\n[data-deck-active] .anim-wipe {\n  animation: wipeIn 0.9s cubic-bezier(.6,.05,.2,1) both;\n  animation-delay: 0.35s;\n}\n@keyframes wipeIn {\n  from { transform: scaleX(0); }\n  to   { transform: scaleX(1); }\n}\n\n.anim-stretch { transform-origin: left center; }\n[data-deck-active] .anim-stretch {\n  animation: wipeIn 1.1s cubic-bezier(.6,.05,.2,1) both;\n}\n\n/* Char-by-char title reveal */\n.split-word {\n  display: inline-block;\n  overflow: hidden;\n  vertical-align: top;\n  line-height: 0.92;\n}\n.split-word > span {\n  display: inline-block;\n}\n[data-deck-active] .split-word > span {\n  animation: riseChar 0.9s cubic-bezier(.2,.8,.2,1) both;\n}\n\n@keyframes riseChar {\n  from { transform: translateY(110%); }\n  to   { transform: translateY(0); }\n}\n\n/* ---------- Parcours card ---------- */\n.card {\n  background: #FFFFFF;\n  border: 1px solid rgba(26,21,48,0.08);\n  border-radius: 22px;\n  padding: 32px 32px 28px;\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  position: relative;\n  overflow: hidden;\n  transition: transform 0.5s cubic-bezier(.2,.7,.2,1), box-shadow 0.5s ease;\n  box-shadow: 0 1px 0 rgba(26,21,48,0.04);\n}\n.card::before {\n  content: '';\n  position: absolute;\n  inset: 0 0 auto 0;\n  height: 6px;\n  background: linear-gradient(90deg,\n    var(--g-sky) 0%, var(--g-sky) 16%,\n    var(--g-olive) 16%, var(--g-olive) 38%,\n    var(--g-lime) 38%, var(--g-lime) 50%,\n    var(--g-pink) 50%, var(--g-pink) 64%,\n    var(--g-mint) 64%, var(--g-mint) 82%,\n    var(--g-yellow) 82%, var(--g-yellow) 100%);\n}\n.card.compact { padding: 24px 24px 22px; border-radius: 18px; gap: 10px; }\n.card.compact::before { height: 5px; }\n\n.card .icon {\n  font-size: 44px;\n  line-height: 1;\n}\n.card .ctitle {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: 32px;\n  letter-spacing: -0.02em;\n  line-height: 1.05;\n  color: var(--ink);\n}\n.card.compact .ctitle { font-size: 26px; }\n\n.card .csub {\n  font-size: 18px;\n  color: var(--ink-mute);\n  font-weight: 500;\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n}\n.card .cmeta {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 10px;\n  margin-top: 4px;\n}\n.card .pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  background: var(--cream);\n  color: var(--ink);\n  padding: 7px 13px;\n  border-radius: 999px;\n  font-size: 17px;\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  white-space: nowrap;\n}\n.card .pill.violet { background: var(--violet-soft); color: var(--violet-deep); }\n.card .pill.orange { background: var(--orange-soft); color: #8B3414; }\n.card .pill.draft  { background: #FFE9C4; color: #8A5C00; }\n.card .pill.warn   { background: #FFD4C2; color: #8B3414; }\n.card .pill.future { background: var(--ink); color: var(--cream); }\n\n.card .clink {\n  margin-top: auto;\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  color: var(--violet);\n  font-weight: 600;\n  font-size: 17px;\n  text-decoration: none;\n}\n.card .clink::after { content: '↗'; font-weight: 400; }\n\n/* RNCP ribbon */\n.rncp-tag {\n  position: absolute;\n  top: 22px;\n  right: 24px;\n  font-family: var(--font-mono);\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--ink-mute);\n  letter-spacing: 0.04em;\n}\n\n/* ---------- Big stat block ---------- */\n.stat {\n  display: flex;\n  flex-direction: column;\n}\n.stat .num {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: 220px;\n  line-height: 0.85;\n  letter-spacing: -0.045em;\n  color: var(--violet);\n}\n.stat .num.ink { color: var(--ink); }\n.stat .label {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 28px;\n  color: var(--ink);\n  margin-top: 18px;\n  letter-spacing: -0.005em;\n  max-width: 340px;\n  line-height: 1.2;\n}\n\n/* ---------- Section divider ---------- */\n.sec-num {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 26px;\n  letter-spacing: 0.1em;\n  color: var(--orange);\n  text-transform: uppercase;\n}\n.sec-divider .frame { padding-top: 140px; }\n.sec-divider .sec-rncp {\n  font-family: var(--font-mono);\n  font-size: 26px;\n  color: var(--ink-mute);\n  letter-spacing: 0.02em;\n  margin-top: 12px;\n}\n.sec-divider .sec-count {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 36px;\n  color: var(--ink);\n  margin-top: 36px;\n}\n.sec-divider .sec-count .big {\n  font-size: 96px;\n  font-weight: 800;\n  letter-spacing: -0.03em;\n  color: var(--violet);\n  display: inline-block;\n  vertical-align: middle;\n  line-height: 1;\n  margin-right: 14px;\n}\n\n/* ---------- Floating shapes / decoration ---------- */\n.deco-shape {\n  position: absolute;\n  border-radius: 999px;\n  filter: blur(0px);\n}\n\n.dot-grid {\n  position: absolute;\n  inset: 0;\n  background-image: radial-gradient(circle, rgba(26,21,48,0.07) 1.5px, transparent 1.5px);\n  background-size: 28px 28px;\n  pointer-events: none;\n  opacity: 0.5;\n}\n\n/* ---------- Marquee (subtle) ---------- */\n.marquee {\n  overflow: hidden;\n  white-space: nowrap;\n  display: flex;\n  gap: 64px;\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: 24px;\n  color: var(--ink-mute);\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n}\n.marquee > div {\n  display: flex;\n  gap: 64px;\n  animation: scroll 40s linear infinite;\n  flex-shrink: 0;\n}\n@keyframes scroll {\n  from { transform: translateX(0); }\n  to   { transform: translateX(-100%); }\n}\n\n/* ---------- Modal: parcours details ---------- */\n.pmodal-backdrop {\n  position: fixed;\n  inset: 0;\n  background: rgba(26, 21, 48, 0.55);\n  backdrop-filter: blur(8px);\n  -webkit-backdrop-filter: blur(8px);\n  z-index: 1000;\n  display: none;\n  align-items: center;\n  justify-content: center;\n  padding: 60px;\n  opacity: 0;\n  transition: opacity 0.3s ease;\n}\n.pmodal-backdrop[data-open] {\n  display: flex;\n  opacity: 1;\n}\n.pmodal {\n  background: var(--cream);\n  border-radius: 28px;\n  max-width: 1280px;\n  width: 100%;\n  max-height: calc(100vh - 120px);\n  overflow-y: auto;\n  position: relative;\n  box-shadow: 0 40px 100px rgba(26, 21, 48, 0.4);\n  transform: scale(0.94) translateY(20px);\n  transition: transform 0.4s cubic-bezier(.2,.7,.2,1);\n}\n.pmodal-backdrop[data-open] .pmodal {\n  transform: scale(1) translateY(0);\n}\n.pmodal::before {\n  content: '';\n  position: sticky;\n  top: 0;\n  display: block;\n  height: 8px;\n  background: linear-gradient(90deg,\n    var(--g-sky) 0%, var(--g-sky) 16%,\n    var(--g-olive) 16%, var(--g-olive) 38%,\n    var(--g-lime) 38%, var(--g-lime) 50%,\n    var(--g-pink) 50%, var(--g-pink) 64%,\n    var(--g-mint) 64%, var(--g-mint) 82%,\n    var(--g-yellow) 82%, var(--g-yellow) 100%);\n  z-index: 2;\n}\n.pmodal-close {\n  position: absolute;\n  top: 28px;\n  right: 28px;\n  width: 48px;\n  height: 48px;\n  border-radius: 50%;\n  background: var(--ink);\n  color: var(--cream);\n  border: none;\n  cursor: pointer;\n  font-size: 22px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  z-index: 3;\n  font-family: var(--font-display);\n  transition: transform 0.2s ease;\n}\n.pmodal-close:hover { transform: rotate(90deg) scale(1.06); }\n.pmodal-body {\n  padding: 56px 64px 64px;\n}\n.pmodal-head { display: flex; gap: 32px; align-items: flex-start; }\n.pmodal-head .picon { font-size: 80px; line-height: 1; }\n.pmodal
